<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Codex 用量</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-app-region: no-drag;
    user-select: none;
    overflow: hidden;
  }
  .panel {
    position: absolute; inset: 4px;
    background: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
    color: rgba(255,255,255,0.85);
  }
  .title-row {
    display: flex; align-items: center; justify-content: space-between;
    -webkit-app-region: drag;
  }
  .title { font-size: 12px; font-weight: 600; opacity: 0.6; }
  .close-btn {
    -webkit-app-region: no-drag;
    width: 18px; height: 18px; border-radius: 50%;
    border: none; background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5); font-size: 11px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(255,59,48,0.6); }
  .progress-bg {
    height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    -webkit-app-region: drag;
  }
  .progress-bar {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #30D158 0%, #FF9F0A 70%, #FF3B30 100%);
    transition: width 0.5s ease;
  }
  .details {
    display: grid; grid-template-columns: auto 1fr;
    gap: 2px 10px; font-size: 11px;
    margin-top: 4px;
    -webkit-app-region: drag;
  }
  .label { opacity: 0.5; text-align: right; }
  .value { opacity: 0.85; font-variant-numeric: tabular-nums; }
  .btn-row {
    display: flex; justify-content: center; gap: 8px;
    margin-top: 8px;
  }
  .refresh-btn, .settings-btn {
    -webkit-app-region: no-drag;
    padding: 4px 14px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    font-size: 11px; cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover, .settings-btn:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.85);
  }
  .token-section {
    margin-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 8px;
    -webkit-app-region: no-drag;
    user-select: text;
    -webkit-user-select: text;
  }
  .token-input {
    width: 100%; height: 80px; resize: none;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 6px 8px;
    color: rgba(255,255,255,0.75);
    font-size: 10px; font-family: monospace;
    outline: none; box-sizing: border-box;
    -webkit-app-region: no-drag;
    user-select: text;
    -webkit-user-select: text;
  }
  .token-input:focus { border-color: rgba(48,209,88,0.4); }
  .token-actions {
    display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-top: 6px;
    -webkit-app-region: no-drag;
    user-select: none;
  }
  .token-save {
    -webkit-app-region: no-drag;
    padding: 3px 10px; border-radius: 6px;
    border: none; background: rgba(48,209,88,0.2);
    color: #30D158; font-size: 10px; cursor: pointer;
    transition: background 0.2s;
  }
  .token-save:hover { background: rgba(48,209,88,0.35); }
  .token-toast {
    font-size: 10px; color: #30D158; opacity: 0;
    transition: opacity 0.3s;
  }
  .token-toast.show { opacity: 1; }
  .error-state {
    text-align: center; padding: 6px 0;
    color: rgba(255,255,255,0.4); font-size: 12px;
  }
  .loading-state {
    text-align: center; padding: 6px 0;
    color: rgba(255,255,255,0.4); font-size: 12px;
  }
  .window-section {
    margin-bottom: 8px;
  }
  .window-header {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px;
  }
  .window-name {
    font-size: 11px; opacity: 0.5; min-width: 32px;
  }
  .window-percent {
    font-size: 13px; font-weight: 600; min-width: 44px; text-align: right;
  }
</style>
</head>
<body>
  <div class="panel" id="root">
    <div class="loading-state">加载中...</div>
  </div>

  <script>
    var showToken = false;
    var tokenValue = '';
    var lastRefreshTime = Date.now();
    var REFRESH_INTERVAL = 180000; // 默认 3 min，会从主进程获取
    var countdownTimer = null;

    // 从主进程获取刷新间隔和上次刷新时间
    if (window.tooltipAPI && window.tooltipAPI.getPollInterval) {
      window.tooltipAPI.getPollInterval().then(function(minutes) {
        REFRESH_INTERVAL = minutes * 60000;
      });
    }
    if (window.tooltipAPI && window.tooltipAPI.getLastChatgptRefreshTime) {
      window.tooltipAPI.getLastChatgptRefreshTime().then(function(time) {
        if (time) lastRefreshTime = time;
      });
    }

    function getRemainingStr() {
      var remaining = Math.max(0, REFRESH_INTERVAL - (Date.now() - lastRefreshTime));
      var min = Math.floor(remaining / 60000);
      var sec = Math.floor((remaining % 60000) / 1000);
      if (min > 0) return min + 'min' + (sec > 0 ? sec + 's' : '');
      return sec + 's';
    }

    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(function() {
        var btn = document.querySelector('.refresh-btn');
        if (btn && !btn.disabled) btn.textContent = '刷新 (' + getRemainingStr() + ')';
      }, 1000);
    }

    function formatResetTime(seconds) {
      if (seconds < 60) return seconds + ' 秒';
      var min = Math.ceil(seconds / 60);
      if (min < 60) return min + ' 分钟';
      var h = Math.floor(min / 60);
      var m = min % 60;
      if (h < 24) return h + ' 小时' + (m > 0 ? ' ' + m + ' 分钟' : '');
      var d = Math.floor(h / 24);
      var rh = h % 24;
      return d + ' 天' + (rh > 0 ? ' ' + rh + ' 小时' : '') + (m > 0 ? ' ' + m + ' 分钟' : '');
    }

    function renderWindow(name, windowData) {
      var pct = windowData.usedPercent;
      var barColor = pct < 75 ? '#30D158' : pct < 90 ? '#FF9F0A' : '#FF3B30';
      var resetStr = formatResetTime(windowData.resetAfterSeconds);

      return '<div class="window-section">' +
        '<div class="window-header">' +
          '<span class="window-name">' + name + '</span>' +
          '<div style="flex:1">' +
            '<div class="progress-bg"><div class="progress-bar" style="width:' + Math.min(pct, 100) + '%;background:' + barColor + '"></div></div>' +
          '</div>' +
          '<span class="window-percent" style="color:' + barColor + '">' + pct + '%</span>' +
        '</div>' +
        '<div class="details">' +
          '<span class="label">重置</span><span class="value">' + resetStr + '后</span>' +
        '</div>' +
      '</div>';
    }

    function renderUsage(data) {
      var root = document.getElementById('root');

      if (!data || !data.isValid) {
        root.innerHTML =
          '<div class="title-row">' +
            '<span class="title">Codex 用量</span>' +
            '<button class="close-btn" onclick="window.close()">×</button>' +
          '</div>' +
          '<div class="error-state">查询失败<br><span style="font-size:10px;opacity:0.6">' +
          (data && data.error ? data.error : '请检查 token 设置') +
          '</span></div>' +
          '<div class="btn-row"><button class="refresh-btn" onclick="doRefresh()">刷新 (' + getRemainingStr() + ')</button>' +
          '<button class="settings-btn" onclick="toggleToken()">Token设置</button></div>' +
          buildTokenSection();
        if (window.tooltipAPI && window.tooltipAPI.resizeChatGPT) {
          var h = 145;
          if (showToken) h += 145;
          window.tooltipAPI.resizeChatGPT(h);
        }
        startCountdown();
        return;
      }

      var html = '<div class="title-row">' +
        '<span class="title">Codex 用量</span>' +
        '<button class="close-btn" onclick="window.close()">×</button>' +
      '</div>';

      // 5小时窗口
      if (data.primary) {
        html += renderWindow('5小时', data.primary);
      }

      // 周窗口
      if (data.secondary) {
        html += renderWindow('周', data.secondary);
      }

      html += '<div class="btn-row"><button class="refresh-btn" onclick="doRefresh()">刷新 (' + getRemainingStr() + ')</button>' +
        '<button class="settings-btn" onclick="toggleToken()">Token设置</button></div>' +
        buildTokenSection();

      root.innerHTML = html;

      // 高度动态计算
      if (window.tooltipAPI && window.tooltipAPI.resizeChatGPT) {
        var h = 100;
        if (data.primary) h += 50;
        if (data.secondary) h += 50;
        if (showToken) h += 130;
        window.tooltipAPI.resizeChatGPT(h);
      }
      startCountdown();
    }

    function buildTokenSection() {
      if (!showToken) return '';
      setTimeout(bindToken, 50);
      var escaped = tokenValue.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var sourceHint = window.__manualToken ? '（当前使用手动设置的 Token）' : '（当前从 ~/.codex/auth.json 读取）';
      return '<div class="token-section">' +
        '<div style="font-size:10px;opacity:0.5;margin-bottom:4px">Access Token ' + sourceHint + '</div>' +
        '<textarea class="token-input" id="tokenInput" placeholder="留空则从 ~/.codex/auth.json 读取...">' + escaped + '</textarea>' +
        '<div class="token-actions">' +
          '<span class="token-toast" id="tokenToast">已保存</span>' +
          '<button class="token-save" onclick="saveToken()">保存</button>' +
        '</div>' +
      '</div>';
    }

    function bindToken() {
      var ta = document.getElementById('tokenInput');
      if (!ta || ta._bound) return;
      ta._bound = true;
      ta.setSelectionRange(ta.value.length, ta.value.length);
      ta.addEventListener('input', function() { tokenValue = ta.value; });
      ta.addEventListener('keydown', function(e) {
        if (e.metaKey || e.ctrlKey) {
          if (e.key === 'v') {
            e.preventDefault();
            if (window.tooltipAPI && window.tooltipAPI.readClipboard) {
              window.tooltipAPI.readClipboard().then(function(text) {
                if (!text) return;
                var s = ta.selectionStart, en = ta.selectionEnd;
                ta.value = ta.value.substring(0, s) + text + ta.value.substring(en);
                ta.selectionStart = ta.selectionEnd = s + text.length;
                tokenValue = ta.value;
              });
            }
          } else if (e.key === 'a') {
            e.preventDefault();
            ta.select();
          }
        }
      });
    }

    function toggleToken() {
      showToken = !showToken;
      renderUsage(window.__chatgptData);
    }

    function saveToken() {
      var input = document.getElementById('tokenInput');
      var val = input ? input.value.trim() : tokenValue.trim();
      tokenValue = val;
      if (window.tooltipAPI && window.tooltipAPI.updateToken) {
        window.tooltipAPI.updateToken(val).then(function(res) {
          if (res && res.ok) {
            var toast = document.getElementById('tokenToast');
            if (toast) {
              toast.textContent = '已保存';
              toast.style.color = '#30D158';
              toast.classList.add('show');
              setTimeout(function() { toast.classList.remove('show'); }, 2000);
            }
            showToken = false;
            doRefresh();
          } else {
            var toast = document.getElementById('tokenToast');
            if (toast) {
              toast.textContent = res.error || 'Token 无效';
              toast.style.color = '#FF3B30';
              toast.classList.add('show');
              setTimeout(function() { toast.classList.remove('show'); }, 3000);
            }
          }
        });
      }
    }

    function doRefresh() {
      var btn = document.querySelector('.refresh-btn');
      if (btn) { btn.textContent = '刷新中...'; btn.disabled = true; }
      if (window.tooltipAPI && window.tooltipAPI.refreshChatGPT) {
        window.tooltipAPI.refreshChatGPT().then(function(data) {
          lastRefreshTime = Date.now();
          window.__chatgptData = data;
          renderUsage(data);
        }).catch(function() {
          if (btn) { btn.textContent = '刷新 (' + getRemainingStr() + ')'; btn.disabled = false; }
        });
      }
    }

    // 初始数据由 main process 通过 executeJavaScript 注入
    if (window.__chatgptData) {
      renderUsage(window.__chatgptData);
    }
  </script>
</body>
</html>
